<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40">
  <rect width="40" height="40" rx="6" fill="#4B7CF6"/>
  <!-- horizontal line, split by circle -->
  <line x1="4" y1="20" x2="12" y2="20" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="28" y1="20" x2="36" y2="20" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- circle with background fill to cut through line -->
  <circle cx="20" cy="20" r="7" fill="#4B7CF6" stroke="white" stroke-width="2.5"/>
  <!-- plus sign -->
  <line x1="20" y1="15.5" x2="20" y2="24.5" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="15.5" y1="20" x2="24.5" y2="20" stroke="white" stroke-width="2" stroke-linecap="round"/>
</svg>
